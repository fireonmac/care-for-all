name: care-for-all

services:
  app:
    build:
      context: .
      target: runner
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./app_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: file:/app/data/sqlite.db
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:?Set OLLAMA_MODEL in .env}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/test').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrator
    profiles:
      - tools
    volumes:
      - ./app_data:/app/data
    environment:
      DATABASE_URL: file:/app/data/sqlite.db
    command: ["pnpm", "exec", "drizzle-kit", "push"]
