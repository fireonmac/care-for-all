name: care-for-all

services:
  app:
    build:
      context: .
      target: runner
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - ./app_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: file:/app/data/sqlite.db
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_MODEL: ${AI_MODEL:-gemma4:26b}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:11434}
      AI_API_KEY: ${AI_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/test').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
  studio:
    build:
      context: .
      target: migrator
    profiles:
      - tools
    ports:
      - "127.0.0.1:14983:4983"  # 스튜디오 포트 외부(localhost) 연결
    volumes:
      - ./app_data:/app/data
    environment:
      DATABASE_URL: file:/app/data/sqlite.db
    command: ["pnpm", "exec", "drizzle-kit", "studio", "--host", "0.0.0.0"]

  migrate:
    build:
      context: .
      target: migrator
    profiles:
      - tools
    volumes:
      - ./app_data:/app/data
    environment:
      DATABASE_URL: file:/app/data/sqlite.db
    command: ["pnpm", "exec", "drizzle-kit", "push"]
